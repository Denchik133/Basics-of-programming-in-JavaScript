<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <title>Tasks</title>
        <style>
        body {
            font-family: Arial;
            padding: 40px;
            background: #f4f4f4;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        input, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }

        li {
            padding: 10px;
            background: #e3e7ff;
            margin-top: 5px;
            cursor: pointer;
        }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Список задач</h1>
            <input id="taskInput" placeholder="Нове завдання">
            <button id="addBtn">Додати</button>
            <ul id="taskList"></ul>
        </div>
        <script src="script.js"></script>
    </body>
</html>
