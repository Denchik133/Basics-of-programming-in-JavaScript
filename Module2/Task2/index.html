<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <title>Counter Closure</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        .value {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
        }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Counter</h1>
            <input id="initial" placeholder="Initial value">
            <button onclick="createNewCounter()">Create Counter</button>
            <button onclick="incrementCounter()">Increment</button>
            <button onclick="decrementCounter()">Decrement</button>
            <button onclick="resetCounter()">Reset</button>
            <div class="value" id="value">0</div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
