<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <title>Tooltip System</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        button, input {
            margin: 10px;
            padding: 8px;
        }

        .tooltip {
            position: absolute;
            padding: 8px 12px;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            opacity: 0;
            pointer-events: auto;
            transition: opacity 0.2s;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .tooltip.show {
            opacity: 1;
        }

        .tooltip.info { background: #3498db; }
        .tooltip.success { background: #2ecc71; }
        .tooltip.warning { background: #f39c12; }
        .tooltip.error { background: #e74c3c; }

        .tooltip-arrow {
            width: 0;
            height: 0;
            position: absolute;
            border-style: solid;
        }

        .top .tooltip-arrow {
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0 5px;
            border-color: #333 transparent transparent transparent;
        }

        .bottom .tooltip-arrow {
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 5px 5px 5px;
            border-color: transparent transparent #333 transparent;
        }

        .left .tooltip-arrow {
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 5px 0 5px 5px;
            border-color: transparent transparent transparent #333;
        }

        .right .tooltip-arrow {
            left: -5px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 5px 5px 5px 0;
            border-color: transparent #333 transparent transparent;
        }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Tooltip Demo</h1>
            <div id="elements"></div>
            <h2>Form</h2>
            <label>
                Name
                <input data-tooltip="Enter your full name" data-trigger="focus">
            </label>
            <label>
                Email
                <input data-tooltip="Valid email required" data-type="warning" data-trigger="focus">
            </label>
            <h2>Interactive Tooltip</h2>
            <button data-tooltip="<b>Click button:</b><br><button onclick='alert(1)'>Click me</button>" data-trigger="click">
                Interactive
            </button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
