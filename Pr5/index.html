<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>TODO Manager</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 8px;
      max-width: 800px;
      margin: auto;
    }

    input, textarea, select {
      display: block;
      margin: 5px 0;
      padding: 6px;
      width: 100%;
    }

    button {
      padding: 6px 12px;
      margin-top: 5px;
      cursor: pointer;
    }

    .task {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }

    .overdue {
      background: #ffe5e5;
    }
  </style>
</head>
<body>
    <div class="container">
        <h1>TODO App</h1>
        <h3>Create Task</h3>
        <input id="title" placeholder="Title">
        <textarea id="description" placeholder="Description"></textarea>
        <select id="priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>      
    <input id="dueDate" type="date">
    <input id="tags" placeholder="tags separated by comma">
    <button onclick="createTask()">Create Task</button>
    <h3>Tasks</h3>   
    <div id="taskList"></div>
    <h3>Statistics</h3>
    <button onclick="showStats()">Show Stats</button>
    <div id="stats"></div>
</div>
<script src="script.js"></script>
</body>
</html>
